<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YT</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    width: 100%;
    background: black;
  }
  iframe {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    border: 0;
  }
</style>
</head>
<body>
<script>
  const params = new URLSearchParams(window.location.search);
  const videoId = params.get('id');
  const playlistId = params.get('list');

  if (!videoId && !playlistId) {
    document.body.innerHTML = '<p style="color:white; text-align:center; margin-top:20%;">No video or playlist ID provided.</p>';
  } else {
    const iframe = document.createElement('iframe');

    if (playlistId) {
      fetch(`https://www.youtube-nocookie.com/oembed?url=playlist?list=${playlistId}&format=json`)
        .then(res => res.json())
        .then(data => { document.title = data.title; })
        .catch(() => { document.title = "YT Playlist"; });

      iframe.src = `https://www.youtube-nocookie.com/embed/videoseries?list=${playlistId}`;
    } else {
      fetch(`https://www.youtube-nocookie.com/oembed?url=/watch?v=${videoId}&format=json`)
        .then(res => res.json())
        .then(data => { document.title = data.title; })
        .catch(() => { document.title = "YT Video"; });

      iframe.src = `https://www.youtube-nocookie.com/embed/${videoId}`;
    }

    iframe.allow = 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share';
    iframe.allowFullscreen = true;
    iframe.referrerPolicy = 'strict-origin-when-cross-origin';
    document.body.appendChild(iframe);
  }
</script>
</body>
</html>
